name: Release
on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  semantic-release:
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: flanksource/action-workflows/.github/workflows/create-release.yml@main
    with:
      extra_plugins: |
        @semantic-release/git
    secrets:
      token: ${{ secrets.FLANKBOT }}

  docker:
    needs: semantic-release
    if: ${{ needs.semantic-release.outputs.published == 'true' }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: canary-checker-ui
            build_args: |
              APP_DEPLOYMENT=CANARY_CHECKER
              WITHOUT_AUTH=true
          - image: incident-manager-ui
            build_args: |
              APP_DEPLOYMENT=INCIDENT_MANAGER
              WITHOUT_AUTH=false
    uses: flanksource/action-workflows/.github/workflows/publish-docker-image.yml@main
    with:
      platforms: linux/amd64,linux/arm64
      login_to_ecr: true
      image_tags: |
        flanksource/${{ matrix.image }}:latest
        flanksource/${{ matrix.image }}:v${{ needs.semantic-release.outputs.version }}
        public.ecr.aws/k4y9r6y5/${{ matrix.image }}:latest
        public.ecr.aws/k4y9r6y5/${{ matrix.image }}:v${{ needs.semantic-release.outputs.version }}
      build_args: ${{ matrix.build_args }}
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_password: ${{ secrets.DOCKER_PASSWORD }}
      aws_access_key_id: ${{ secrets.ECR_AWS_ACCESS_KEY }}
      aws_secret_access_key: ${{ secrets.ECR_AWS_SECRET_ACCESS_KEY }}

  helm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [semantic-release, docker]
    if: ${{ needs.semantic-release.outputs.published == 'true' }}
    outputs:
      release-version: ${{ needs.semantic-release.outputs.version }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@446798f8213ac2e75931c1b0769676d927801858 # v2.10.3
        with:
          egress-policy: audit

      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
      - name: Update chart version
        uses: mikefarah/yq@7ccaf8e700ce99eb3f0f6cef7f5930a0b3c827cd # v4.49.2
        with:
          cmd: yq -i '.version = "${{ needs.semantic-release.outputs.version }}"' chart/Chart.yaml
      - name: Update app version
        uses: mikefarah/yq@7ccaf8e700ce99eb3f0f6cef7f5930a0b3c827cd # v4.49.2
        with:
          cmd: yq -i '.appVersion = "${{ needs.semantic-release.outputs.version }}"' chart/Chart.yaml
      - name: Update image tags
        uses: mikefarah/yq@7ccaf8e700ce99eb3f0f6cef7f5930a0b3c827cd # v4.49.2
        with:
          cmd: yq -i '.image.tag = "v${{ needs.semantic-release.outputs.version }}"' chart/values.yaml
      - name: Set up Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
      - name: Package Helm chart
        run: |
          helm package ./chart
      - name: Upload helm chart artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: helm-chart
          path: flanksource-ui-*.tgz

  push-helm-chart:
    needs: helm
    permissions:
      contents: read
    if: always() && needs.helm.result == 'success'
    uses: flanksource/action-workflows/.github/workflows/push-helm-chart.yml@4b41aaf6cf7727789c0d21cd0bc262e850ba543f # main
    with:
      filename_regex: "flanksource-ui-*.tgz"
      version: ${{ needs.helm.outputs.release-version }}
      pr_title: "Release ${{ needs.helm.outputs.release-version }} of ${{ github.repository }}"
    secrets:
      token: ${{ secrets.FLANKBOT }}

  update-canary-checker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    needs: [docker, push-helm-chart, semantic-release]
    if: ${{ needs.semantic-release.outputs.published == 'true' }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@446798f8213ac2e75931c1b0769676d927801858 # v2.10.3
        with:
          egress-policy: audit

      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          repository: "${{ github.repository_owner }}/canary-checker"
          token: ${{ secrets.FLANKBOT }}
          path: ./canary-checker
      - name: Install yq
        run: |
          wget https://github.com/mikefarah/yq/releases/download/${VERSION}/${BINARY}.tar.gz -O - |\
          tar xz && sudo mv ${BINARY} /usr/bin/yq
        env:
          VERSION: v4.25.1
          BINARY: yq_linux_amd64
      - name: Update flanksource-ui version in canary-checker
        run: |
          cd canary-checker
          yq eval-all -i  '(.dependencies[] | select(.name == "flanksource-ui")) ref $d | $d.version = "${{ needs.semantic-release.outputs.version }}"' chart/Chart.yaml
      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update flanksource-ui to ${{ needs.semantic-release.outputs.version }}"
          token: ${{ secrets.FLANKBOT }}
          title: "chore: update flanksource-ui to ${{ needs.semantic-release.outputs.version }}"
          branch: "update-flanksource-ui"
          path: ./canary-checker
