name: release-prod
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-prod:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@446798f8213ac2e75931c1b0769676d927801858 # v2.10.3
        with:
          egress-policy: audit

      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.FLANKBOT }}

      - name: Fast-forward prod to main
        run: |
          git fetch origin prod:prod
          if ! git merge-base --is-ancestor prod main; then
            echo "::error::prod has commits not in main; refusing to push to avoid creating new commits."
            exit 1
          fi
          git push origin main:prod
